<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="theme-color" content="#2c0eeb" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <title>Interno Rotas 🚌 | Horários e Rotas dos Ônibus da UFMG</title>

    <meta
      name="description"
      content="Planeje seus trajetos no campus Pampulha da UFMG com o Interno Rotas. Acesse um mapa interativo com as rotas e os horários em tempo real dos ônibus internos para otimizar seu tempo."
    />
    <meta
      name="keywords"
      content="UFMG, ônibus, linha, interno, rotas, horários, mapa, Campus Pampulha, transporte universitário"
    />
    <meta name="author" content="Igor Martins" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://internorotas.github.io/ufmg/" />

    <!-- Pré-carrega dados críticos para reduzir tempo de carregamento inicial -->
    <link rel="preload" as="fetch" href="%BASE_URL%data/linhas.json" crossorigin />
    <link rel="preload" as="fetch" href="%BASE_URL%data/paradas.json" crossorigin />
    <!-- Pré-resolve DNS do servidor de tiles do mapa antes da interação -->
    <link rel="dns-prefetch" href="https://tile.openstreetmap.org" />

    <link rel="icon" href="%BASE_URL%logo_Icone.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />
    <link rel="manifest" href="%BASE_URL%site.webmanifest" />
