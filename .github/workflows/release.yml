name: Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: |
            pnpm-lock.yaml
            app/pnpm-lock.yaml

      - name: Instalar dependências da raiz
        run: pnpm install

      - name: Instalar dependências do app
        working-directory: ./app
        run: pnpm install

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Build e Deploy (Publica no GH Pages)
        # Este passo só corre se o build e a versão estiverem OK
        working-directory: ./app
        run: |
          pnpm run build
          pnpm run deploy
        env:
          # Injeta o token para o comando 'gh-pages' conseguir fazer push
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
