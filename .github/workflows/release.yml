name: Release and Deploy Frontend
on:
  push:
    branches: [main]

permissions:
  contents: write # Necessário para o Semantic Release criar tags e commits
  pages: write    # Necessário para publicar no GH Pages
  id-token: write

jobs:
  release-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessário para o Semantic Release ler o histórico

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: |
            pnpm-lock.yaml
            app/pnpm-lock.yaml

      - name: Instalar dependências da raiz
        run: pnpm install

      - name: Instalar dependências do app
        working-directory: ./app
        run: pnpm install

      - name: Rodar Verificações (Biome)
        run: pnpm run check

      - name: Semantic Release (Gera a Versão)
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Build e Deploy (Publica no GH Pages)
        # Este passo só corre se o build e a versão estiverem OK
        working-directory: ./app
        run: |
          pnpm run build
          pnpm run deploy
        env:
          # Injeta o token para o comando 'gh-pages' conseguir fazer push
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}