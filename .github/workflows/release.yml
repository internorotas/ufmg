name: Release and Deploy Frontend

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Necessário para o Semantic Release ler o histórico de commits
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: |
            pnpm-lock.yaml
            app/pnpm-lock.yaml

      - name: Instalar dependências
        run: pnpm install --recursive --frozen-lockfile

      - name: Semantic Release (Gera a Versão e o Changelog)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Isto é o que gera a tag, atualiza o package.json e cria o CHANGELOG.md!
        run: pnpm exec semantic-release

      - name: Configurar identidade do git para deploy
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Deploy no GH Pages
        working-directory: ./app
        env:
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
        run: pnpm run deploy